          <div class="link-box" id="box-social"> <h2 class="box-title">Social</h2>
              <ul>
                  </ul>

              <ul>
                  </ul>
          </div>

          <div class="link-box" id="box-cloud">

              <ul>

          </div>

          <div class="link-box" id="box-money">
              <h2 class="box-title">Money</h2>
              <ul>
                  </ul>
          </div>

          <div class="link-box" id="box-other">

              <ul>

           </div> </div> <div class="footer">

    <div id="waveform-collage">
      <svg
        class="waves"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink"
        viewBox="0 24 150 28"
        preserveAspectRatio="none"
      >
        <defs>
          <path
            id="gentle-wave"
            d="M-160 44c30 0
      58-18 88-18s
      58 18 88 18
      58-18 88-18
      58 18 88 18
      v44h-352z"
          />
        </defs>
        <g class="parallax">
          <use xlink:href="#gentle-wave" x="50" y="0" />
          <use xlink:href="#gentle-wave" x="50" y="3" />
          <use xlink:href="#gentle-wave" x="50" y="6" />
        </g>
      </svg>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
